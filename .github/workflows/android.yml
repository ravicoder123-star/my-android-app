name: Build Android APK & AAB

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build APK/AAB
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Capacitor Android
        run: |
          npx cap add android || echo "Android platform exists"
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > my-release-key.jks
          ls -la my-release-key.jks

      - name: Build APK & AAB
        run: |
          cd android
          ./gradlew clean bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/my-release-key.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --no-daemon \
            --stacktrace \
            --info \
            --warning-mode all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk
          retention-days: 7- name: Decode keystore
  run: |
    # Remove all whitespace and special characters
    CLEAN_KEYSTORE=$(echo "${{ secrets.KEYSTORE }}" | tr -d '[:space:]' | sed 's/[^[:alnum:]+//g')
    
    # Add padding if needed
    PADDED_KEYSTORE=$(echo "$CLEAN_KEYSTORE" | awk '{ len=length; mod=len%4; if(mod!=0) printf "%s", substr("====", 1, 4-mod); }')
    
    # Decode with strict validation
    echo "$PADDED_KEYSTORE" | base64 -d > android/keystore.jks
    
    # Verify decoding success
    if [ ! -s android/keystore.jks ]; then
      echo "::error::Keystore decoding failed!"
      exit 1
    fi
- name: Verify keystore
  run: |
    file android/keystore.jks
    echo "Keystore size: $(wc -c < android/keystore.jks) bytes"
# When creating new secrets:
echo "$(base64 -w0 keystore.jks)" | pbcopy
